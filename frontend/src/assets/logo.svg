<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient definitions -->
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main circle background -->
  <circle cx="20" cy="20" r="18" fill="url(#logoGradient)"/>
  
  <!-- AI bot icon - simplified -->
  <g transform="translate(20, 20)">
    <!-- Head -->
    <circle cx="0" cy="-5" r="5" fill="white"/>
    <!-- Eyes -->
    <circle cx="-2" cy="-5" r="1.2" fill="#4f46e5"/>
    <circle cx="2" cy="-5" r="1.2" fill="#4f46e5"/>
    <!-- Body -->
    <rect x="-4" y="0" width="8" height="8" rx="1" fill="white"/>
    <!-- Antenna/signal -->
    <line x1="-5" y1="-8" x2="-5" y2="-12" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="-5" cy="-13" r="0.8" fill="white"/>
  </g>
</svg>